<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kairos — 離線中</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fbeacb;
      color: #2a1f12;
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      text-align: center;
    }
    .card { padding: 2rem; max-width: 20rem; }
    h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
    p { font-size: .9rem; color: #3d2e1a; margin: 0 0 1.5rem; }
    button {
      background: #ab3326;
      color: #fff;
      border: 0;
      border-radius: .375rem;
      padding: .6rem 1.4rem;
      font-size: .9rem;
      cursor: pointer;
    }
    button:hover { background: #c44a3a; }
  </style>
</head>
<body>
  <div class="card">
    <h1>目前沒有網路連線</h1>
    <p>墨已備好，靜候網路歸來。連上網路後再試一次。</p>
    <button onclick="location.reload()">重新載入</button>
  </div>
</body>
</html>
