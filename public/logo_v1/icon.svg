<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbeacb"/>
      <stop offset="100%" stop-color="#e7c894"/>
    </linearGradient>
    <linearGradient id="flame-grad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffd27a"/>
      <stop offset="40%" stop-color="#ef8a32"/>
      <stop offset="100%" stop-color="#6f1a10"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb24a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffb24a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background card -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle warm inner glow -->
  <rect width="512" height="512" rx="108" fill="url(#glow)" opacity="0.5"/>

  <!-- Clock ring -->
  <circle cx="256" cy="206" r="148" fill="none" stroke="#2a1f12" stroke-opacity="0.16" stroke-width="6"/>

  <!-- Hour ticks -->
  <g stroke="#2a1f12" stroke-opacity="0.4" stroke-linecap="round">
    <line x1="330.5" y1="65.3" x2="321.8" y2="80.4" stroke-width="5"/>
    <line x1="389.7" y1="132.5" x2="378.0" y2="139.7" stroke-width="5"/>
    <line x1="404" y1="206" x2="388" y2="206" stroke-width="6"/>
    <line x1="389.7" y1="279.5" x2="378.0" y2="272.3" stroke-width="5"/>
    <line x1="330.5" y1="346.7" x2="321.8" y2="331.6" stroke-width="5"/>
    <line x1="256" y1="354" x2="256" y2="368" stroke-width="6"/>
    <line x1="181.5" y1="346.7" x2="190.2" y2="331.6" stroke-width="5"/>
    <line x1="122.3" y1="279.5" x2="134.0" y2="272.3" stroke-width="5"/>
    <line x1="108" y1="206" x2="124" y2="206" stroke-width="6"/>
    <line x1="122.3" y1="132.5" x2="134.0" y2="139.7" stroke-width="5"/>
    <line x1="181.5" y1="65.3" x2="190.2" y2="80.4" stroke-width="5"/>
  </g>

  <!-- Minute hand (~4 o'clock) -->
  <line x1="256" y1="206" x2="318" y2="272" stroke="#a87f3e" stroke-width="7" stroke-linecap="round"/>
  <!-- Hour hand (~10 o'clock) -->
  <line x1="256" y1="206" x2="200" y2="160" stroke="#2a1f12" stroke-width="9" stroke-linecap="round" opacity="0.75"/>

  <!-- Flame glow at 12 -->
  <ellipse cx="256" cy="72" rx="26" ry="34" fill="#ffb24a" opacity="0.22"/>
  <!-- Flame body -->
  <path d="M256 44 C248 54,236 68,238 84 C240 98,248 108,256 110 C264 108,272 98,274 84 C276 68,264 54,256 44 Z"
        fill="url(#flame-grad)"/>
  <!-- Inner highlight -->
  <ellipse cx="254" cy="78" rx="5" ry="11" fill="#ffd27a" opacity="0.6"/>
  <!-- Wick -->
  <line x1="256" y1="110" x2="256" y2="126" stroke="#2a1f12" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- Centre pivot -->
  <circle cx="256" cy="206" r="7" fill="#2a1f12" opacity="0.55"/>

  <!-- Wordmark -->
  <text x="256" y="378" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="62" font-weight="700" fill="#2a1f12" letter-spacing="1">Kairos</text>
  <text x="256" y="420" text-anchor="middle"
        font-family="'Noto Serif SC',serif"
        font-size="28" fill="#8a6b3e" letter-spacing="10">墨時</text>
</svg>
